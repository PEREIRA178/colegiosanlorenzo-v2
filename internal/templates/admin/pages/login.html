<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iniciar Sesión — CSL Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
:root {
  --md-primary:#9B1230; --md-on-primary:#fff;
  --md-primary-container:#F5E0E4; --md-on-primary-container:#5C0A1E;
  --md-primary-dark:#6E0C22; --md-primary-faint:#FDF0F2;
  --md-surface:#FAF8F7; --md-surface-variant:#F2EFF0;
  --md-on-surface:#1C1B1A; --md-on-surface-variant:#4D4B4C;
  --md-outline:#7E7B7C; --md-outline-variant:#CEC9CA;
  --glass-bg:rgba(250,248,247,0.72); --glass-blur:blur(20px) saturate(180%);
  --glass-border:rgba(155,18,48,0.10); --glass-shadow:0 8px 32px rgba(155,18,48,0.08);
  --elev-3:0 4px 12px rgba(28,27,26,.10),0 2px 4px rgba(28,27,26,.06);
  --elev-4:0 8px 24px rgba(28,27,26,.12),0 2px 6px rgba(28,27,26,.06);
  --ease-express:cubic-bezier(0.05,0.7,0.1,1.0);
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --r-md:16px; --r-lg:24px; --r-xl:32px; --r-full:9999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:var(--font-body);
  background:linear-gradient(135deg,#5C0A1E 0%,#9B1230 40%,#BE3356 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(-45deg,rgba(255,255,255,0.02) 0px,rgba(255,255,255,0.02) 1px,transparent 1px,transparent 20px);
}

.login-card{
  width:100%;max-width:420px;
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);
  border-radius:var(--r-xl);
  box-shadow:var(--elev-4);
  padding:48px 40px;
  position:relative;z-index:1;
  animation:slideUp 600ms var(--ease-express) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-brand-icon{
  width:48px;height:48px;border-radius:12px;
  background:var(--md-primary);display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:var(--font-display);font-size:22px;font-weight:400;
  box-shadow:0 2px 8px rgba(155,18,48,0.3);
}
.login-brand-text{display:flex;flex-direction:column}
.login-brand-name{font-family:var(--font-display);font-size:18px;color:var(--md-on-surface);line-height:1.1}
.login-brand-sub{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--md-outline);font-weight:500}

h1{font-family:var(--font-display);font-size:28px;font-weight:400;color:var(--md-on-surface);margin-bottom:8px}
.login-subtitle{font-size:14px;color:var(--md-on-surface-variant);margin-bottom:32px;line-height:1.6}

.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--md-on-surface-variant);margin-bottom:6px}
.field input{
  width:100%;padding:12px 16px;font-family:var(--font-body);font-size:15px;
  background:var(--md-surface);border:1.5px solid var(--md-outline-variant);
  border-radius:12px;color:var(--md-on-surface);outline:none;
  transition:border-color 200ms, box-shadow 200ms;
}
.field input:focus{border-color:var(--md-primary);box-shadow:0 0 0 3px rgba(155,18,48,0.12)}
.field input::placeholder{color:var(--md-outline)}

.remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.remember-row label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--md-on-surface-variant);cursor:pointer}
.remember-row input[type="checkbox"]{
  width:18px;height:18px;border-radius:4px;border:1.5px solid var(--md-outline-variant);
  accent-color:var(--md-primary);cursor:pointer;
}

.btn-login{
  width:100%;padding:14px;font-family:var(--font-body);font-size:15px;font-weight:500;
  background:var(--md-primary);color:var(--md-on-primary);border:none;
  border-radius:var(--r-full);cursor:pointer;
  box-shadow:0 2px 8px rgba(155,18,48,0.3);
  transition:background 200ms var(--ease-express),transform 200ms var(--ease-express);
}
.btn-login:hover{background:var(--md-primary-dark);transform:translateY(-2px)}
.btn-login:active{transform:translateY(0)}

.toast{padding:12px 16px;border-radius:12px;font-size:13px;margin-top:16px;animation:fadeIn 300ms ease}
.toast-error{background:#FDECEA;color:#B71C1C;border:1px solid rgba(183,28,28,0.15)}
.toast-success{background:#E8F5E9;color:#1B5E20;border:1px solid rgba(27,94,32,0.15)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.login-footer{text-align:center;margin-top:24px;font-size:12px;color:var(--md-outline)}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-brand">
    <div class="login-brand-icon">SL</div>
    <div class="login-brand-text">
      <div class="login-brand-name">Colegio San Lorenzo</div>
      <div class="login-brand-sub">Panel de administración</div>
    </div>
  </div>

  <h1>Iniciar sesión</h1>
  <p class="login-subtitle">Ingresa tus credenciales para acceder al dashboard de gestión.</p>

  <form hx-post="/admin/login" hx-target="#login-feedback" hx-swap="innerHTML">
    <div class="field">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" placeholder="tu@colegiosanlorenzo.cl" required autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
    </div>
    <div class="remember-row">
      <label><input type="checkbox" name="remember"/> Recordar sesión</label>
    </div>
    <button type="submit" class="btn-login">Ingresar al dashboard</button>
    <div id="login-feedback"></div>
  </form>

  <p class="login-footer">Colegio San Lorenzo · Copiapó, Atacama</p>
</div>
</body>
</html>
