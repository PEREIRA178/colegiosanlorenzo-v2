  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Playlists</h2>
      <button class="topbar-btn topbar-btn-primary"
              hx-get="/admin/playlists/new"
              hx-target="#playlist-editor-area"
              hx-swap="innerHTML">
        <span class="material-symbols-outlined" style="font-size:16px">add</span> Nueva playlist
      </button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Nombre</th><th>Estado</th><th>Items</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody id="playlists-tbody"
             hx-get="/admin/playlists?fragment=list"
             hx-trigger="load, playlistCreated from:body, playlistUpdated from:body, playlistDeleted from:body"
             hx-swap="innerHTML">
        <tr><td colspan="4" style="text-align:center;padding:32px;color:var(--md-outline)">
          <div style="width:24px;height:24px;border:2px solid var(--md-primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 8px"></div>
          Cargando playlists...
        </td></tr>
      </tbody>
    </table>
  </div>
  <div id="playlist-editor-area" style="margin-top:24px"></div>
