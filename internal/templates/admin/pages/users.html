  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Gestión de Usuarios</h2>
      <button class="topbar-btn topbar-btn-primary"
              hx-post="/admin/users"
              hx-target="#modal-container"
              hx-swap="innerHTML">
        <span class="material-symbols-outlined" style="font-size:16px">person_add</span> Crear usuario
      </button>
    </div>
    <div id="users-table-wrap"
         hx-get="/admin/users?fragment=table"
         hx-trigger="load, userCreated from:body, userUpdated from:body, userDeleted from:body"
         hx-swap="innerHTML">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Teléfono</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--md-outline)">
            <div style="width:24px;height:24px;border:2px solid var(--md-primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 8px"></div>
            Cargando usuarios...
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
