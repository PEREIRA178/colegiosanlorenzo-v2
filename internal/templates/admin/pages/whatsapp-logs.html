  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Logs de WhatsApp</h2>
      <span style="font-size:12px;color:var(--md-outline)">Últimas 100 entregas</span>
    </div>
    <div id="wa-table-wrap"
         hx-get="/admin/whatsapp-logs?fragment=table"
         hx-trigger="load"
         hx-swap="innerHTML">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Teléfono</th>
            <th>Mensaje</th>
            <th>Dirección</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--md-outline)">
            <div style="width:24px;height:24px;border:2px solid var(--md-primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 8px"></div>
            Cargando logs...
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
