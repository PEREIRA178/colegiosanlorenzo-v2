  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Gestión de Eventos</h2>
      <button class="topbar-btn topbar-btn-primary"
              hx-get="/admin/events/new"
              hx-target="#modal-container"
              hx-swap="innerHTML">
        <span class="material-symbols-outlined" style="font-size:16px">add</span> Nuevo evento
      </button>
    </div>
    <div id="events-table-wrap"
         hx-get="/admin/events?fragment=table"
         hx-trigger="load, eventCreated from:body, eventUpdated from:body, eventDeleted from:body"
         hx-swap="innerHTML">
      <table>
        <thead>
          <tr>
            <th>Título</th>
            <th>Categoría</th>
            <th>Urgencia</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>WhatsApp</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--md-outline)">
            <div style="width:24px;height:24px;border:2px solid var(--md-primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 8px"></div>
            Cargando eventos...
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="modal-container"></div>
