  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Gestión de Multimedia</h2>
      <button class="topbar-btn topbar-btn-primary"
              hx-get="/admin/multimedia/new"
              hx-target="#modal-container"
              hx-swap="innerHTML">
        <span class="material-symbols-outlined" style="font-size:16px">upload</span> Subir archivo
      </button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Nombre</th><th>Tipo</th><th>Duración</th><th>Estado</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody id="media-tbody"
             hx-get="/admin/multimedia?fragment=rows"
             hx-trigger="load, mediaCreated from:body, mediaUpdated from:body, mediaDeleted from:body"
             hx-swap="innerHTML">
        <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--md-outline)">
          <div style="width:24px;height:24px;border:2px solid var(--md-primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 8px"></div>
          Cargando archivos...
        </td></tr>
      </tbody>
    </table>
  </div>
