<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>CSL Totem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --primary:#9B1230;--primary-dark:#6E0C22;--primary-container:#F5E0E4;
  --surface:#FAF8F7;--surface-bright:#FFFFFF;
  --on-surface:#1C1B1A;--on-surface-variant:#4D4B4C;
  --outline-variant:#CEC9CA;
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--surface);font-family:var(--font-body)}

/* ── TOTEM SHELL ── */
.totem{width:100vw;height:100vh;display:flex;flex-direction:column}

/* ── HEADER BAR ── */
.totem-header{
  height:52px;background:var(--primary);color:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px
}
.totem-header-brand{font-family:var(--font-display);font-size:15px;letter-spacing:.01em}
.totem-header-time{font-variant-numeric:tabular-nums;font-size:14px;font-weight:500}

/* ── CAROUSEL PANEL (60%) ── */
.carousel-panel{
  flex:0 0 60%;display:flex;flex-direction:column;
  position:relative;background:#000;overflow:hidden
}
.slide-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.slide{
  position:absolute;inset:0;opacity:0;
  transition:opacity 600ms ease
}
.slide.active{opacity:1}
.slide img,.slide video{width:100%;height:100%;object-fit:contain}

/* Content block slide */
.slide-cb{
  display:flex;align-items:center;justify-content:center;height:100%;
  position:relative;background:linear-gradient(160deg,var(--primary) 0%,var(--primary-dark) 100%)
}
.slide-cb.urgent{background:linear-gradient(160deg,#B71C1C 0%,#7F0000 100%)}
.slide-cb-bg{position:absolute;inset:0}
.slide-cb-bg img{width:100%;height:100%;object-fit:cover;opacity:.2}
.slide-cb-body{position:relative;z-index:1;padding:28px 24px;text-align:center;max-width:90%}
.slide-cb-chip{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:12px}
.slide-cb-title{font-family:var(--font-display);font-size:clamp(24px,5vw,48px);color:#fff;line-height:1.1;margin-bottom:14px}
.slide-cb-desc{font-size:clamp(13px,1.8vw,18px);color:rgba(255,255,255,.8);line-height:1.6}

/* Progress bar */
.progress-track{height:4px;background:rgba(255,255,255,.2);flex-shrink:0}
.progress-fill{height:4px;background:rgba(255,255,255,.8);width:0;transition:width linear}

/* ── CAROUSEL CONTROLS ── below image, touch-friendly ── */
.carousel-controls{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  background:#0a0a0a;padding:0;height:80px;gap:0
}
.ctrl-btn{
  flex:0 0 100px;height:80px;background:rgba(255,255,255,.06);border:none;
  color:rgba(255,255,255,.75);font-size:28px;font-family:var(--font-body);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 150ms;user-select:none;touch-action:manipulation
}
.ctrl-btn:active{background:rgba(155,18,48,.5)}
.ctrl-btn-prev::after{content:'‹ Ant'}
.ctrl-btn-next::after{content:'Sig ›'}
.carousel-dots{flex:1;display:flex;align-items:center;justify-content:center;gap:8px}
.dot{
  width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);
  cursor:pointer;transition:background 200ms,transform 200ms;touch-action:manipulation
}
.dot.active{background:#fff;transform:scale(1.3)}

/* Duration badge */
.duration-badge{
  position:absolute;top:12px;right:12px;z-index:20;
  background:rgba(0,0,0,.55);color:#fff;font-size:12px;font-weight:500;
  padding:4px 10px;border-radius:20px;font-variant-numeric:tabular-nums;
  backdrop-filter:blur(4px)
}

/* ── INFO PANEL (40%) ── */
.info-panel{
  flex:1;background:var(--surface);display:flex;flex-direction:column;
  padding:20px 18px;gap:0;overflow:hidden;min-height:0
}
.clock-row{display:flex;align-items:baseline;gap:10px;flex-shrink:0;margin-bottom:16px}
.clock-time{
  font-family:var(--font-display);font-size:clamp(28px,5vw,44px);
  color:var(--on-surface);font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1
}
.clock-date{font-size:12px;color:var(--on-surface-variant);line-height:1.4;flex:1}

.divider{height:1px;background:var(--outline-variant);margin-bottom:14px;flex-shrink:0}

.events-label{
  font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--primary);margin-bottom:12px;flex-shrink:0
}
.events-list{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:8px;min-height:0}
.event-item{
  background:var(--surface-bright);border-radius:10px;padding:12px 13px;
  border-left:3px solid var(--primary);flex-shrink:0;
  box-shadow:0 1px 3px rgba(28,27,26,.06);cursor:pointer;
  transition:transform 150ms,box-shadow 150ms;touch-action:manipulation
}
.event-item:active{transform:scale(.98)}
.event-item.urgent{border-left-color:#B71C1C}
.event-cat{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);margin-bottom:3px}
.event-item.urgent .event-cat{color:#B71C1C}
.event-title{font-size:12.5px;font-weight:500;color:var(--on-surface);line-height:1.35}
.event-date{font-size:11px;color:var(--on-surface-variant);margin-top:3px}
.events-empty{font-size:13px;color:var(--on-surface-variant);opacity:.55;font-style:italic}

/* ── EVENT DETAIL MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(28,27,26,.55);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;
  opacity:0;transition:opacity 300ms ease;pointer-events:none
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{
  width:100%;background:var(--surface-bright);border-radius:24px 24px 0 0;
  padding:28px 20px 40px;max-height:70vh;overflow-y:auto;
  transform:translateY(100%);transition:transform 350ms cubic-bezier(0.05,0.7,0.1,1)
}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--outline-variant);border-radius:2px;margin:0 auto 20px}
.modal-cat{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:8px}
.modal-title{font-family:var(--font-display);font-size:22px;color:var(--on-surface);margin-bottom:12px;line-height:1.2}
.modal-desc{font-size:14px;color:var(--on-surface-variant);line-height:1.65;margin-bottom:20px}
.modal-date{font-size:12px;color:var(--on-surface-variant);margin-bottom:20px}
.modal-close{
  width:100%;padding:14px;border:none;border-radius:9999px;
  background:var(--primary);color:#fff;font-size:14px;font-weight:500;
  font-family:var(--font-body);cursor:pointer;touch-action:manipulation
}
.modal-close:active{background:var(--primary-dark)}
</style>
</head>
<body>

<div class="totem" id="totem">

  <!-- Header -->
  <div class="totem-header">
    <span class="totem-header-brand">Colegio San Lorenzo · <span id="device-name">Totem</span></span>
    <span class="totem-header-time" id="header-time">--:--</span>
  </div>

  <!-- Carousel panel (60%) -->
  <div class="carousel-panel">
    <div class="slide-wrap" id="slide-wrap">
      <div class="slide active" id="slide-init" style="background:#111;display:flex;align-items:center;justify-content:center">
        <div style="text-align:center;color:rgba(255,255,255,.3)">
          <div style="font-family:var(--font-display);font-size:72px;line-height:1">CSL</div>
          <div style="font-size:14px;margin-top:8px">Cargando...</div>
        </div>
      </div>
    </div>
    <div class="duration-badge" id="duration-badge" style="display:none">10s</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="carousel-controls">
      <button class="ctrl-btn ctrl-btn-prev" id="btn-prev" ontouchstart="manualPrev()" onclick="manualPrev()" aria-label="Anterior"></button>
      <div class="carousel-dots" id="dots"></div>
      <button class="ctrl-btn ctrl-btn-next" id="btn-next" ontouchstart="manualNext()" onclick="manualNext()" aria-label="Siguiente"></button>
    </div>
  </div>

  <!-- Info panel (40%) -->
  <div class="info-panel">
    <div class="clock-row">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">Colegio San Lorenzo</div>
    </div>
    <div class="divider"></div>
    <div class="events-label">Próximos eventos</div>
    <div class="events-list" id="events-list">
      <div class="events-empty">Cargando...</div>
    </div>
  </div>

</div>

<!-- Event detail modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-cat" id="modal-cat"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <button class="modal-close" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────────
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML }
function escA(s){ return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;') }

const code = window.location.pathname.split('/').pop();

// ── Clock ──────────────────────────────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  document.getElementById('header-time').textContent =
    now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  const d = now.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('clock-date').textContent = d.charAt(0).toUpperCase()+d.slice(1);
}
setInterval(updateClock,1000);
updateClock();

// ── Carousel state ─────────────────────────────────────────────────────────────
let playlist = {items:[]};
let currentIdx = 0;
let slideTimer = null;
let remainingTimer = null;
let paused = false;
let resumeTimer = null;

function buildSlide(item){
  const tipo = item.tipo||'';
  if(tipo==='image'){
    return '<img src="'+escA(item.url||'')+'" alt="'+escA(item.name||'')+'" style="width:100%;height:100%;object-fit:contain"/>';
  }
  if(tipo==='video'){
    const st = item.start_time||0;
    const src = st>0 ? (item.url||'')+'#t='+st : (item.url||'');
    return '<video autoplay muted playsinline loop style="width:100%;height:100%;object-fit:contain">'
      +'<source src="'+escA(src)+'" type="video/mp4"/></video>';
  }
  if(tipo==='content_block'){
    const urgent = item.urgency;
    const bgImgHTML = item.image_url
      ? '<div class="slide-cb-bg"><img src="'+escA(item.image_url)+'" alt=""/></div>' : '';
    return '<div class="slide-cb'+(urgent?' urgent':'')+'">'+bgImgHTML
      +'<div class="slide-cb-body">'
      +(urgent?'<div class="slide-cb-chip">⚠ URGENTE</div>':'')
      +'<div class="slide-cb-title">'+esc(item.title||item.name||'')+'</div>'
      +(item.description?'<div class="slide-cb-desc">'+esc(item.description)+'</div>':'')
      +'</div></div>';
  }
  return '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#1a1a1a">'
    +'<div style="font-family:var(--font-display);font-size:32px;color:#fff;opacity:.3">'+esc(item.name||'')+'</div></div>';
}

function updateDots(idx){
  const container = document.getElementById('dots');
  if(!playlist.items||playlist.items.length<=1){container.innerHTML='';return}
  container.innerHTML = playlist.items.map((_, i)=>
    '<div class="dot'+(i===idx?' active':'')+'" onclick="jumpToSlide('+i+')" ontouchstart="jumpToSlide('+i+')"></div>'
  ).join('');
}

let durationSec = 10;
let durationCountdown = null;

function startDurationCountdown(sec){
  clearInterval(durationCountdown);
  durationSec = sec;
  const badge = document.getElementById('duration-badge');
  badge.style.display = 'block';
  badge.textContent = durationSec+'s';
  durationCountdown = setInterval(()=>{
    if(paused) return;
    durationSec--;
    if(durationSec<=0){
      clearInterval(durationCountdown);
      badge.textContent='0s';
    } else {
      badge.textContent=durationSec+'s';
    }
  },1000);
}

function showSlide(idx, animated){
  if(!playlist.items||playlist.items.length===0) return;
  idx = ((idx%playlist.items.length)+playlist.items.length)%playlist.items.length;
  currentIdx = idx;
  const item = playlist.items[idx];
  const wrap = document.getElementById('slide-wrap');

  const el = document.createElement('div');
  el.className = 'slide';
  el.innerHTML = buildSlide(item);
  wrap.appendChild(el);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.style.opacity='1';
    el.style.transition='opacity 600ms ease';
    wrap.querySelectorAll('.slide.active').forEach(s=>{
      s.style.opacity='0';
      s.style.transition='opacity 600ms ease';
      setTimeout(()=>{ if(s.parentNode)s.parentNode.removeChild(s) },700);
    });
    el.classList.add('active');
  }));

  updateDots(idx);

  const dur = (item.duration_seconds||10)*1000;

  // Progress bar
  const fill = document.getElementById('progress-fill');
  fill.style.transition='none';
  fill.style.width='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fill.style.transition='width '+dur+'ms linear';
    fill.style.width='100%';
  }));

  startDurationCountdown(Math.round(dur/1000));

  clearTimeout(slideTimer);
  if(!paused){
    slideTimer = setTimeout(()=>showSlide(currentIdx+1,true), dur);
  }
}

function manualPrev(){
  clearTimeout(resumeTimer);
  paused = true;
  clearTimeout(slideTimer);
  showSlide(currentIdx-1, true);
  resumeAutoplay();
}

function manualNext(){
  clearTimeout(resumeTimer);
  paused = true;
  clearTimeout(slideTimer);
  showSlide(currentIdx+1, true);
  resumeAutoplay();
}

function jumpToSlide(idx){
  clearTimeout(resumeTimer);
  paused = true;
  clearTimeout(slideTimer);
  showSlide(idx, true);
  resumeAutoplay();
}

function resumeAutoplay(){
  clearTimeout(resumeTimer);
  resumeTimer = setTimeout(()=>{
    paused = false;
    // Schedule next slide based on remaining duration
    const item = playlist.items[currentIdx];
    const dur = (item&&item.duration_seconds||10)*1000;
    clearTimeout(slideTimer);
    slideTimer = setTimeout(()=>showSlide(currentIdx+1,true), Math.min(durationSec*1000+100, dur));
  }, 10000); // resume after 10s inactivity
}

function loadPlaylist(keepIdx){
  fetch('/api/devices/'+code+'/playlist')
    .then(r=>r.json())
    .then(data=>{
      if(data.device&&data.device.name){
        document.getElementById('device-name').textContent = data.device.name;
      }
      if(!data.items||data.items.length===0){
        document.getElementById('slide-wrap').innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#111">'
          +'<div style="text-align:center;color:rgba(255,255,255,.3)">'
          +'<div style="font-size:48px;margin-bottom:8px">📺</div>'
          +'<div style="font-size:14px">Sin playlist asignada</div></div></div>';
        document.getElementById('dots').innerHTML='';
        return;
      }
      playlist = data;
      paused = false;
      showSlide(keepIdx ? currentIdx : 0, false);
    })
    .catch(()=>{});
}

// ── Events ─────────────────────────────────────────────────────────────────────
let eventsData = [];

function loadEvents(){
  fetch('/api/events/upcoming?limit=3')
    .then(r=>r.json())
    .then(evs=>{
      eventsData = evs||[];
      renderEvents();
    })
    .catch(()=>{});
}

function renderEvents(){
  const el = document.getElementById('events-list');
  if(!eventsData||eventsData.length===0){
    el.innerHTML='<div class="events-empty">Sin eventos próximos</div>';
    return;
  }
  el.innerHTML = eventsData.map((ev,i)=>`
    <div class="event-item${ev.urgency?' urgent':''}" onclick="showEventDetail(${i})" ontouchend="showEventDetail(${i})">
      <div class="event-cat">${esc(ev.category)}</div>
      <div class="event-title">${esc(ev.title)}</div>
      ${ev.date?'<div class="event-date">'+esc(ev.date)+'</div>':''}
    </div>`).join('');
}

loadEvents();
setInterval(loadEvents,60000);

// ── Event detail modal ─────────────────────────────────────────────────────────
function showEventDetail(idx){
  const ev = eventsData[idx];
  if(!ev) return;
  document.getElementById('modal-cat').textContent = ev.category||'';
  document.getElementById('modal-title').textContent = ev.title||'';
  document.getElementById('modal-date').textContent = ev.date||'';
  document.getElementById('modal-desc').textContent = ev.description||ev.title||'';
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── WebSocket ──────────────────────────────────────────────────────────────────
let ws, wsDelay=2000;
function connectWS(){
  const proto = location.protocol==='https:'?'wss:':'ws:';
  ws = new WebSocket(proto+'//'+location.host+'/ws/device/'+code);
  ws.onopen = ()=>{ wsDelay=2000 };
  ws.onmessage = e=>{
    try{
      const msg = JSON.parse(e.data);
      if(msg.type==='refresh_all'||msg.type==='playlist_update'){
        loadPlaylist(true);
      } else if(msg.type==='event_update'||msg.type==='refresh_web'){
        loadEvents();
      }
    }catch(_){}
  };
  ws.onclose = ()=>{ setTimeout(()=>{ connectWS(); wsDelay=Math.min(wsDelay*2,30000) },wsDelay) };
  ws.onerror = ()=>ws.close();
  setInterval(()=>{ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'heartbeat',code:code})) },25000);
}
connectWS();

// ── Init ───────────────────────────────────────────────────────────────────────
loadPlaylist(false);
setInterval(()=>loadPlaylist(true),300000);

// Wake lock
if('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
</script>
</body>
</html>
