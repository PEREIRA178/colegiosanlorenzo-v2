<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>CSL Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --primary:#9B1230;--primary-dark:#6E0C22;
  --surface:#FAF8F7;--on-surface:#1C1B1A;--on-surface-variant:#4D4B4C;
  --outline-variant:#CEC9CA;
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--font-body)}

/* ── KIOSK SHELL ── */
.kiosk{width:100vw;height:100vh;display:flex;flex-direction:column}
.kiosk-main{flex:1;display:grid;grid-template-columns:70fr 30fr;min-height:0}
.kiosk-statusbar{
  height:44px;background:var(--primary);color:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;font-size:13px;font-weight:500;letter-spacing:.01em
}

/* ── MEDIA PANEL (70%) ── */
.media-panel{position:relative;background:#000;overflow:hidden}
.slide-wrap{position:absolute;inset:0}
.slide{
  position:absolute;inset:0;opacity:0;
  transition:opacity 600ms ease
}
.slide.active{opacity:1}
.slide img,.slide video{width:100%;height:100%;object-fit:contain}
.slide-cb{
  display:flex;align-items:center;justify-content:center;
  height:100%;position:relative;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%)
}
.slide-cb.urgent{background:linear-gradient(135deg,#B71C1C 0%,#7F0000 100%)}
.slide-cb-bg{position:absolute;inset:0;z-index:0}
.slide-cb-bg img{width:100%;height:100%;object-fit:cover;opacity:.22}
.slide-cb-body{
  position:relative;z-index:1;max-width:72%;text-align:center;padding:40px
}
.slide-cb-chip{
  display:inline-block;font-size:11px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:18px
}
.slide-cb-title{
  font-family:var(--font-display);font-size:clamp(32px,5vw,72px);
  color:#fff;line-height:1.1;margin-bottom:20px
}
.slide-cb-desc{font-size:clamp(14px,1.8vw,22px);color:rgba(255,255,255,.82);line-height:1.65}

/* Progress bar */
.progress-track{
  position:absolute;bottom:0;left:0;right:0;height:4px;
  background:rgba(255,255,255,.18);z-index:10
}
.progress-fill{
  height:4px;background:rgba(255,255,255,.85);width:0;
  transition:width linear
}

/* ── INFO PANEL (30%) ── */
.info-panel{
  background:var(--surface);display:flex;flex-direction:column;
  padding:28px 22px;gap:0;overflow:hidden
}

/* Clock */
.clock-block{flex-shrink:0;margin-bottom:20px}
.clock-time{
  font-family:var(--font-display);font-size:clamp(36px,5vw,64px);
  color:var(--on-surface);font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1
}
.clock-date{font-size:13px;color:var(--on-surface-variant);margin-top:6px;line-height:1.4}

/* Divider */
.divider{height:1px;background:var(--outline-variant);margin-bottom:18px;flex-shrink:0}

/* Weather */
.weather-block{flex-shrink:0;margin-bottom:18px}
.weather-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.weather-left{flex:1;min-width:0}
.weather-temp{
  font-family:var(--font-display);font-size:clamp(28px,3.5vw,52px);
  color:var(--on-surface);line-height:1;letter-spacing:-1px
}
.weather-cond{font-size:13px;color:var(--on-surface-variant);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.weather-loc{
  font-size:9.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--on-surface-variant);margin-top:3px;opacity:.55
}
.uv-badge{
  text-align:center;padding:10px 12px;border-radius:10px;
  background:rgba(28,27,26,.06);min-width:58px;flex-shrink:0;
  transition:background 400ms
}
.uv-val{
  font-family:var(--font-display);font-size:clamp(20px,2.5vw,32px);
  color:var(--on-surface);line-height:1;transition:color 400ms
}
.uv-label{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--on-surface-variant);margin-top:2px}

/* Events */
.events-block{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.events-label{
  font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--primary);margin-bottom:14px;flex-shrink:0
}
.events-list{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.event-item{
  background:#fff;border-radius:12px;padding:14px 14px;
  border-left:3px solid var(--primary);flex-shrink:0;
  box-shadow:0 1px 4px rgba(28,27,26,.06)
}
.event-item.urgent{border-left-color:#B71C1C}
.event-cat{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:4px}
.event-item.urgent .event-cat{color:#B71C1C}
.event-title{font-size:13px;font-weight:500;color:var(--on-surface);line-height:1.35}
.event-date{font-size:11px;color:var(--on-surface-variant);margin-top:5px}
.events-empty{font-size:13px;color:var(--on-surface-variant);opacity:.55;padding:8px 0;font-style:italic}

/* CSL Logo area (bottom of info) */
.info-footer{flex-shrink:0;margin-top:auto;padding-top:16px;text-align:center}
.info-footer-brand{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-display);font-size:13px;color:var(--on-surface-variant)
}
</style>
</head>
<body>

<div class="kiosk">
  <div class="kiosk-main">

    <!-- 70% carousel -->
    <div class="media-panel" id="media-panel">
      <div class="slide-wrap" id="slide-wrap">
        <div class="slide active" id="slide-init" style="background:#111;display:flex;align-items:center;justify-content:center">
          <div style="text-align:center;color:rgba(255,255,255,.35)">
            <div style="font-family:var(--font-display);font-size:96px;line-height:1">CSL</div>
            <div style="font-size:15px;margin-top:10px;font-family:var(--font-body)">Cargando...</div>
          </div>
        </div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <!-- 30% info -->
    <div class="info-panel">
      <div class="clock-block">
        <div class="clock-time" id="clock-time">--:--:--</div>
        <div class="clock-date" id="clock-date">Colegio San Lorenzo</div>
      </div>
      <div class="divider"></div>

      <!-- Weather + UV widget -->
      <div class="weather-block" id="weather-block" style="display:none">
        <div class="weather-row">
          <div class="weather-left">
            <div class="weather-temp" id="wx-temp">—</div>
            <div class="weather-cond" id="wx-cond">—</div>
            <div class="weather-loc">COPIAPÓ, CHILE</div>
          </div>
          <div class="uv-badge" id="uv-badge">
            <div class="uv-val" id="uv-val">—</div>
            <div class="uv-label">Índice UV</div>
          </div>
        </div>
      </div>
      <div class="divider" id="weather-divider" style="display:none"></div>

      <div class="events-block">
        <div class="events-label">Próximos eventos</div>
        <div class="events-list" id="events-list">
          <div class="events-empty">Cargando...</div>
        </div>
      </div>
      <div class="info-footer">
        <div class="info-footer-brand">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h20M4 20V9l8-7 8 7v11"/></svg>
          Colegio San Lorenzo
        </div>
      </div>
    </div>

  </div>
  <div class="kiosk-statusbar">
    <span>Colegio San Lorenzo · <span id="device-name">Display</span></span>
    <span id="status-time" style="font-variant-numeric:tabular-nums">--:--</span>
  </div>
</div>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────────
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML }
function escA(s){ return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;') }

// ── Code from URL ──────────────────────────────────────────────────────────────
const code = window.location.pathname.split('/').pop();

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('status-time').textContent =
    now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  const d = now.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('clock-date').textContent = d.charAt(0).toUpperCase()+d.slice(1);
}
setInterval(updateClock,1000);
updateClock();

// ── Carousel state ─────────────────────────────────────────────────────────────
let playlist = {items:[]};
let currentIdx = 0;
let slideTimer = null;

function buildSlide(item){
  const tipo = item.tipo||'';
  if(tipo==='image'){
    return '<img src="'+escA(item.url||'')+'" alt="'+escA(item.name||'')+'" style="width:100%;height:100%;object-fit:contain"/>';
  }
  if(tipo==='video'){
    const st = item.start_time||0;
    const src = st>0 ? (item.url||'')+'#t='+st : (item.url||'');
    return '<video autoplay muted playsinline loop style="width:100%;height:100%;object-fit:contain">'
      +'<source src="'+escA(src)+'" type="video/mp4"/></video>';
  }
  if(tipo==='content_block'){
    const urgent = item.urgency;
    const bgImgHTML = item.image_url
      ? '<div class="slide-cb-bg"><img src="'+escA(item.image_url)+'" alt=""/></div>' : '';
    const chipHTML = urgent
      ? '<div class="slide-cb-chip">⚠ URGENTE</div>' : '';
    return '<div class="slide-cb'+(urgent?' urgent':'')+'">'+bgImgHTML
      +'<div class="slide-cb-body">'
      +chipHTML
      +'<div class="slide-cb-title">'+esc(item.title||item.name||'')+'</div>'
      +(item.description?'<div class="slide-cb-desc">'+esc(item.description)+'</div>':'')
      +'</div></div>';
  }
  return '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#1a1a1a">'
    +'<div style="font-family:var(--font-display);font-size:40px;color:#fff;opacity:.4">'+esc(item.name||'')+'</div></div>';
}

function showSlide(idx){
  if(!playlist.items || playlist.items.length===0) return;
  idx = ((idx%playlist.items.length)+playlist.items.length)%playlist.items.length;
  currentIdx = idx;
  const item = playlist.items[idx];
  const wrap = document.getElementById('slide-wrap');

  // Build new slide element
  const el = document.createElement('div');
  el.className = 'slide';
  el.innerHTML = buildSlide(item);
  wrap.appendChild(el);

  // Double rAF to ensure paint before transition
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      el.style.opacity = '1';
      el.style.transition = 'opacity 600ms ease';
      // Fade out old active slides
      wrap.querySelectorAll('.slide.active').forEach(s=>{
        s.style.opacity='0';
        s.style.transition='opacity 600ms ease';
        setTimeout(()=>{ if(s.parentNode)s.parentNode.removeChild(s) },700);
      });
      el.classList.add('active');
    });
  });

  // Progress bar
  const dur = (item.duration_seconds||10)*1000;
  const fill = document.getElementById('progress-fill');
  fill.style.transition='none';
  fill.style.width='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fill.style.transition='width '+dur+'ms linear';
    fill.style.width='100%';
  }));

  // Auto-advance
  clearTimeout(slideTimer);
  slideTimer = setTimeout(()=>showSlide(currentIdx+1), dur);
}

function loadPlaylist(keepIdx){
  fetch('/api/devices/'+code+'/playlist')
    .then(r=>r.json())
    .then(data=>{
      if(data.device && data.device.name){
        document.getElementById('device-name').textContent = data.device.name;
      }
      if(!data.items || data.items.length===0){
        document.getElementById('slide-wrap').innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#111">'
          +'<div style="text-align:center;color:rgba(255,255,255,.3)">'
          +'<div style="font-size:64px;margin-bottom:8px">📺</div>'
          +'<div style="font-size:16px;font-family:var(--font-body)">Sin playlist asignada</div></div></div>';
        return;
      }
      playlist = data;
      showSlide(keepIdx ? currentIdx : 0);
    })
    .catch(()=>{});
}

// ── Events panel ───────────────────────────────────────────────────────────────
function loadEvents(){
  fetch('/api/events/upcoming?limit=3')
    .then(r=>r.json())
    .then(evs=>{
      const el = document.getElementById('events-list');
      if(!evs||evs.length===0){
        el.innerHTML='<div class="events-empty">Sin eventos próximos</div>';
        return;
      }
      el.innerHTML = evs.map(ev=>`
        <div class="event-item${ev.urgency?' urgent':''}">
          <div class="event-cat">${esc(ev.category)}</div>
          <div class="event-title">${esc(ev.title)}</div>
          ${ev.date?'<div class="event-date">'+esc(ev.date)+'</div>':''}
        </div>`).join('');
    })
    .catch(()=>{});
}
loadEvents();
setInterval(loadEvents,60000);

// ── WebSocket ──────────────────────────────────────────────────────────────────
let ws, wsDelay=2000;
function connectWS(){
  const proto = location.protocol==='https:'?'wss:':'ws:';
  ws = new WebSocket(proto+'//'+location.host+'/ws/device/'+code);
  ws.onopen = ()=>{ wsDelay=2000 };
  ws.onmessage = e=>{
    try{
      const msg = JSON.parse(e.data);
      if(msg.type==='refresh_all'||msg.type==='playlist_update'){
        loadPlaylist(true); // reload keeping current index
      } else if(msg.type==='event_update'||msg.type==='refresh_web'){
        loadEvents();
      }
    }catch(_){}
  };
  ws.onclose = ()=>{ setTimeout(()=>{ connectWS(); wsDelay=Math.min(wsDelay*2,30000) },wsDelay) };
  ws.onerror = ()=>ws.close();
  // Heartbeat
  setInterval(()=>{ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'heartbeat',code:code})) },25000);
}
connectWS();

// ── Init ───────────────────────────────────────────────────────────────────────
loadPlaylist(false);
setInterval(()=>loadPlaylist(true), 300000); // refresh playlist every 5 min (safety net)

// ── Weather + UV ───────────────────────────────────────────────────────────────
const WMO_ES = {
  0:'Despejado',1:'Mayormente despejado',2:'Parcialmente nublado',3:'Nublado',
  45:'Niebla',48:'Niebla helada',
  51:'Llovizna leve',53:'Llovizna moderada',55:'Llovizna intensa',
  61:'Lluvia leve',63:'Lluvia moderada',65:'Lluvia intensa',
  71:'Nieve leve',73:'Nieve moderada',75:'Nieve intensa',77:'Granizo',
  80:'Chubascos leves',81:'Chubascos moderados',82:'Chubascos fuertes',
  85:'Nieve/chubascos leve',86:'Nieve/chubascos fuerte',
  95:'Tormenta',96:'Tormenta c/granizo',99:'Tormenta intensa'
};
function uvColor(uv){
  if(uv<3) return '#2E7D32';
  if(uv<6) return '#F9A825';
  if(uv<8) return '#E65100';
  if(uv<11) return '#C62828';
  return '#6A1B9A';
}
function loadWeather(){
  fetch('https://api.open-meteo.com/v1/forecast?latitude=-27.3668&longitude=-70.3323&current=temperature_2m,weather_code,uv_index&timezone=America%2FSantiago&wind_speed_unit=kmh')
    .then(r=>r.json())
    .then(d=>{
      const cur = d.current;
      const temp = Math.round(cur.temperature_2m);
      const cond = WMO_ES[cur.weather_code] || 'Variable';
      const uv   = Math.round(cur.uv_index||0);
      const col  = uvColor(uv);
      document.getElementById('wx-temp').textContent = temp+'°';
      document.getElementById('wx-cond').textContent = cond;
      document.getElementById('uv-val').textContent  = uv;
      const badge = document.getElementById('uv-badge');
      badge.style.background = col+'22';
      badge.querySelector('.uv-val').style.color = col;
      document.getElementById('weather-block').style.display  = '';
      document.getElementById('weather-divider').style.display = '';
    })
    .catch(()=>{});
}
loadWeather();
setInterval(loadWeather, 600000); // refresh every 10 min

// ── Kiosk helpers ──────────────────────────────────────────────────────────────
document.addEventListener('click',()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
});
if('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
</script>
</body>
</html>
